version: 2

models:

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: restaurant_id
        tests:
          - not_null

  - name: stg_payments
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique

      - name: amount
        tests:
          - not_null

      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id

  - name: stg_dishes
    columns:
      - name: dish_id
        tests:
          - not_null
          - unique

      - name: dish_name
        tests:
          - not_null

      - name: unit_price
        tests:
          - not_null